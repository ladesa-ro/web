name: Build, Push and Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ci-cd-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  REGISTRY_USERNAME: ${{ github.actor }}
  REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  IMAGE_BASENAME: ${{ github.repository }}

jobs:
  ci:
    name: 'Build and Deploy'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    environment:
      name: ci-cd-web-dev

    steps:
      - name: Checkout do código-fonte
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Autenticação no GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_TOKEN }}

      - name: Construção e publicação da imagem de contêiner
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          file: .docker/Containerfile
          context: ./src/
          target: web-runtime
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}/web:development
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}/web:cache-development
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}/web:cache-development,mode=max

  cd:
    name: 'Deploy'

    runs-on: dev-deploy

    permissions:
      contents: read

    needs: [ci]

    environment:
      name: development
      url: ${{ vars.DEPLOY_URL }}

    steps:
      - name: Checkout do código-fonte
        uses: actions/checkout@v6

      - name: Implantação da aplicação no Kubernetes
        shell: bash
        working-directory: ./.deploy/development/
        run: bash ./deploy.sh
